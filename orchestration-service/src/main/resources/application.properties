spring.application.name=orchestration-service
spring.profiles.active=dev
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.show-details=never

# --- Hikari Pool (reduz cold start de DB) ---
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.connection-timeout=30000

# --- Tomcat ---
server.tomcat.max-threads=50

# --- Feign (timeouts padr§es) ---
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=10000

spring.main.web-application-type=servlet
spring.jpa.open-in-view=false

# Habilita Swagger UI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui
springdoc.packages-to-scan=com.squadprisma.notesoccer.orchestration_service.api.controller
springdoc.paths-to-match=/api/** 

# log para ver se o springdoc ligou
logging.level.org.springdoc=DEBUG
# INFO

security.jwt.secret=${JWT_SECRET_NOTESOCCER:notesoccer-dev-secret}

